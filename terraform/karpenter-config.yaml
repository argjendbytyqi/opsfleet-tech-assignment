apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64", "arm64"] # Requirement: x86 and Graviton
        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["spot"]            # Requirement: Spot instances
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023
  role: "KarpenterNodeRole-innovate-eks-cluster" # The role created by Terraform
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "innovate-eks-cluster"
  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/innovate-eks-cluster: "owned"